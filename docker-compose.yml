services:
  db:
    image: postgres:16-alpine
    container_name: biometric_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biometric_db}
      POSTGRES_USER: ${POSTGRES_USER:-biometric_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biometric_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biometric_user} -d ${POSTGRES_DB:-biometric_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: biometric_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        REQUIREMENTS: dev
    container_name: biometric_web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        REQUIREMENTS: dev
    container_name: biometric_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l info

  # UI de monitoreo de Celery (workers, tasks, colas) — http://localhost:5555
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        REQUIREMENTS: dev
    container_name: biometric_flower
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    command: celery -A config flower --port=5555 --address=0.0.0.0

  # SMTP fake con UI web para ver correos en dev — http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: biometric_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:

# =========================================================
# Stack de PRODUCCIÓN.
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# Diferencias con docker-compose.yml (dev):
#   - imagen target "prod" (gunicorn, requirements/prod.txt, usuario no-root)
#   - sin código por volumen, sin Flower ni Mailpit, sin debug-toolbar
#   - db y redis NO publican puertos al host (solo red interna)
#   - nginx como reverse proxy + TLS + estáticos
# =========================================================

services:
  db:
    image: postgres:16-alpine
    container_name: biometric_db_prod
    restart: unless-stopped
    # env_file pasa POSTGRES_DB/USER/PASSWORD al contenedor; la imagen los lee.
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # $$ se expande dentro del contenedor (no requiere --env-file en compose).
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: biometric_redis_prod
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
      args:
        REQUIREMENTS: prod
    image: biometric_api:prod
    container_name: biometric_web_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      RUN_MIGRATIONS: "true"
      COLLECT_STATIC: "true"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/admin/login/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
      args:
        REQUIREMENTS: prod
    image: biometric_api:prod
    container_name: biometric_celery_worker_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      # La web es la única que migra/recoge estáticos; evita carreras.
      RUN_MIGRATIONS: "false"
      COLLECT_STATIC: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    command: celery -A config worker -l info --concurrency=4

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
      args:
        REQUIREMENTS: prod
    image: biometric_api:prod
    container_name: biometric_celery_beat_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      RUN_MIGRATIONS: "false"
      COLLECT_STATIC: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    command: celery -A config beat -l info

  nginx:
    image: nginx:1.27-alpine
    container_name: biometric_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      - certbot_webroot:/var/www/certbot
      # Build de la SPA (frontend). Para actualizar el front, reemplaza
      # el contenido de /var/www/html/dist en el host (no requiere reiniciar).
      - /var/www/html/dist:/usr/share/nginx/html:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
  certbot_webroot:


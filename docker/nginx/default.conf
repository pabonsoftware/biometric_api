# =========================================================
# nginx :443 sirve la SPA (frontend) y enruta la API a Django.
#   - :80   -> redirige a HTTPS (deja libre la ruta ACME de certbot)
#   - :443  -> TLS (cert autofirmado)
#       /                 -> SPA estática (/usr/share/nginx/html)
#       /api/ /admin/     -> gunicorn (web:8000)
#       /static/ /media/  -> archivos de Django (volúmenes compartidos)
#
# Frontend y API comparten el mismo origen https://98.94.193.64, así que
# las llamadas del front a la API son same-origin (sin problemas de CORS).
#
# Nota: resolver DNS interno de Docker (127.0.0.11) + proxy_pass por variable
# para que nginx NO resuelva "web" al arrancar (evita el bucle de reinicios).
# =========================================================

# ---------- HTTP: redirección a HTTPS ----------
server {
    listen 80;
    server_name _;

    # Reto ACME de certbot (para emitir certificados TLS reales más adelante).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS: frontend + API ----------
server {
    listen 443 ssl;
    server_name _;

    # Certificado autofirmado para la IP 98.94.193.64.
    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25M;

    # DNS embebido de Docker: resuelve "web" en tiempo de petición.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ----- Frontend: SPA estática -----
    root  /usr/share/nginx/html;
    index index.html;

    # ----- API: gunicorn (Django) -----
    location /api/ {
        set $upstream web:8000;
        proxy_pass http://$upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location /admin/ {
        set $upstream web:8000;
        proxy_pass http://$upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # Estáticos de Django (admin, DRF, drf-spectacular).
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Archivos subidos por usuarios.
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    # ----- SPA fallback -----
    # Cualquier ruta que no sea un archivo real devuelve index.html
    # (necesario para el enrutado del lado del cliente).
    location / {
        try_files $uri $uri/ /index.html;
    }
}

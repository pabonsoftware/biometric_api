[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["migrations", "staticfiles"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "DJ",  # flake8-django
]
ignore = [
    "E501",  # line-too-long (lo controla el formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config", "api"]
